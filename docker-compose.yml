version: '3.8'

services:
  gateway:
    image: nginx:alpine
    container_name: fito-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ms-core-agricola
      - ms-inspecciones
    networks:
      - fito-network

  ms-core-agricola:
    build:
      context: ./ms-core-agricola
      dockerfile: Dockerfile
    container_name: fito-ms-core
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    ports:
      - "8001:8000"
    networks:
      - fito-network
    volumes:
      - ./ms-core-agricola/app:/app/app

  ms-inspecciones:
    build:
      context: ./ms-inspecciones
      dockerfile: Dockerfile
    container_name: fito-ms-inspecciones
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    ports:
      - "8002:8000"
    networks:
      - fito-network
    volumes:
      - ./ms-inspecciones/app:/app/app

networks:
  fito-network:
    driver: bridge
